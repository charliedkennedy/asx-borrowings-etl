name: Run Borrowings ETL

on:
  workflow_dispatch:

jobs:
  run-etl:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run ETL
        run: |
          python src/main.py --input tickers.csv --output outputs --pdf-cache pdf_cache

      - name: Upload outputs artifact
        uses: actions/upload-artifact@v4
        with:
          name: borrowings-etl-outputs
          path: outputs/
          if-no-files-found: error

      - name: Check if PDFs were downloaded
        id: pdf_check
        shell: bash
        run: |
          shopt -s nullglob
          files=(pdf_cache/*.pdf pdf_cache/*.PDF)
          if [ ${#files[@]} -gt 0 ]; then
            echo "has_pdfs=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_pdfs=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload PDF cache artifact
        if: steps.pdf_check.outputs.has_pdfs == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: borrowings-etl-pdf-cache
          path: pdf_cache/
          if-no-files-found: error
